name: Needs Demo

on: 
    push:
        branches:
            - main

jobs:
    
    test:
        needs: build
        runs-on: ubuntu-latest

        steps: 
            - name: Run Tests
              run: 
                echo "Running tests..."
                sleep 3
                echo "All tests passed!"

    deploy:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - name: Deploy Application
              run: 
               echo "Deploying..."
               sleep 2
               echo "Deployment successful!"