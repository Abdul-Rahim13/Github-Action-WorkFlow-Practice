name: Multiple Commands

on :
    push:
        branches:
            - main

jobs: 
    linux-commands:
        runs-on: ubuntu-latest

        steps:
            - name: Run Multiple Linux Commands
              run: 
                echo echo "Current Directory:" 
                pwd

                echo "Current Date:"
                date

                echo "Current User:"
                whoami

                echo "Hostname:"
                hostname